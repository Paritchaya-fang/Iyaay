<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Brew & Brown</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-page {
            padding-top: 120px;
            padding-bottom: 60px;
            min-height: 100vh;
        }
        .admin-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-soft);
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .login-card {
            max-width: 450px;
            margin: 0 auto;
        }
        
        /* Table Styles */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 30px;
            border-radius: 12px;
            border: 1px solid rgba(44, 36, 30, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }
        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(44, 36, 30, 0.05);
        }
        th {
            background: #FAFAF8;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover {
            background-color: rgba(163, 123, 94, 0.02);
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-booked { background: rgba(243, 156, 18, 0.1); color: #e67e22; }
        .status-arrived { background: rgba(46, 204, 113, 0.1); color: #27ae60; }
        .status-cancelled { background: rgba(231, 76, 60, 0.1); color: #c0392b; }
        .status-no-show { background: rgba(149, 165, 166, 0.1); color: #7f8c8d; }
        
        .action-btn {
            background: transparent;
            border: 1px solid rgba(44, 36, 30, 0.2);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            font-size: 0.85rem;
            margin-right: 5px;
            transition: var(--transition);
        }
        .action-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <div class="logo">Brew<span>&</span>Brown <span style="font-size: 1rem; color: var(--text-muted); font-family: 'Prompt', sans-serif;">| Admin Workspace</span></div>
            <div>
                <a href="index.html" class="btn btn-outline" style="padding: 8px 16px; font-size: 0.9rem;">View Website</a>
            </div>
        </div>
    </nav>

    <main class="admin-page">
        <div class="container">
            
            <!-- Login Section -->
            <div class="admin-card login-card" id="loginSection">
                <div style="text-align: center; margin-bottom: 30px;">
                    <h2>Admin Login</h2>
                    <p>กรุณาเข้าสู่ระบบเพื่อจัดการคิว</p>
                </div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="adminEmail" class="form-control" required placeholder="admin@brewandbrown.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="adminPassword" class="form-control" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
                    <p id="loginError" style="color: #e74c3c; margin-top: 15px; text-align: center; display: none; font-size: 0.9rem;"></p>
                </form>
            </div>

            <!-- Dashboard Section -->
            <div class="admin-card hidden" id="dashboardSection">
                <div class="header-flex">
                    <div>
                        <h2>Dashboard</h2>
                        <p>ตารางคิวการจองโต๊ะของลูกค้า</p>
                    </div>
                    <div>
                        <button id="logoutBtn" class="btn btn-outline" style="padding: 10px 20px;">Logout</button>
                    </div>
                </div>
                
                <div class="form-group" style="max-width: 300px;">
                    <label>Filter by Date (เลือกวันที่)</label>
                    <input type="date" id="filterDate" class="form-control">
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Ref. ID</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Time</th>
                                <th>Guests</th>
                                <th>Note</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="reservationTableBody">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>

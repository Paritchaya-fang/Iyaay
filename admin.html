<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Iyaay Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: var(--bg-color); color: var(--text-color); }
        .admin-container { 
            max-width: 1000px; 
            margin: 50px auto; 
            padding: 30px; 
            background: var(--card-bg); 
            border-radius: 15px; 
            border: 1px solid var(--border-color); 
            backdrop-filter: blur(10px); 
        }
        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border-color); }
        th { background: rgba(0,0,0,0.2); font-weight: 600; color: var(--primary-color); }
        tr:hover { background: rgba(140, 92, 56, 0.1); }
        
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .status-booked { background: #f39c12; color: #fff; }
        .status-arrived { background: #2ecc71; color: #fff; }
        .status-cancelled { background: #e74c3c; color: #fff; }
        .status-no-show { background: #95a5a6; color: #fff; }
        
        #loginSection { max-width: 400px; margin: 100px auto; }
        .hidden { display: none !important; }
        
        .action-btn { 
            background: none; 
            border: 1px solid var(--primary-color); 
            color: var(--primary-color); 
            padding: 5px 10px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-family: 'Prompt', sans-serif; 
            font-size: 0.85rem; 
            margin-right: 5px;
            transition: all 0.3s ease;
        }
        .action-btn:hover { background: var(--primary-color); color: #fff; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div class="admin-container" id="loginSection">
        <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 20px; font-family: 'Outfit', sans-serif;">Brew & Brown Admin</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email (อีเมลแอดมิน)</label>
                <input type="email" id="adminEmail" class="form-control" required placeholder="admin@iyaay.com">
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>Password (รหัสผ่าน)</label>
                <input type="password" id="adminPassword" class="form-control" required placeholder="********">
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">เข้าสู่ระบบ (Login)</button>
            <p id="loginError" style="color: #e74c3c; margin-top: 15px; text-align: center; display: none; font-size: 0.9rem;"></p>
        </form>
    </div>

    <!-- Dashboard Section -->
    <div class="admin-container hidden" id="dashboardSection">
        <div class="header-flex">
            <h2>จัดการคิวการจองโต๊ะ</h2>
            <button id="logoutBtn" class="btn btn-outline" style="padding: 8px 20px;">ออกจากระบบ</button>
        </div>
        
        <div class="form-group" style="margin-top: 30px; max-width: 250px;">
            <label>📅 เลือกวันที่ดูคิว</label>
            <input type="date" id="filterDate" class="form-control">
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>รหัสอ้างอิง</th>
                        <th>ชื่อลูกค้า</th>
                        <th>เบอร์โทร</th>
                        <th>เวลา</th>
                        <th>จำนวน</th>
                        <th>หมายเหตุ</th>
                        <th>สถานะ</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="reservationTableBody">
                    <!-- Data will be injected here via admin.js -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation - Brew & Brown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar (Always Scrolled style for inner pages) -->
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <div class="logo">Brew<span>&</span>Brown</div>
            <div>
                <a href="index.html" class="btn btn-outline">Back to Home</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="booking-page">
        <div class="container">
            <div class="booking-wrapper">
                <div class="booking-header">
                    <h2>Book your table</h2>
                    <p>กรุณากรอกข้อมูลเพื่อสำรองที่นั่งล่วงหน้า</p>
                </div>

                <form id="reservationForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="bookingDate">วันที่ (Date)</label>
                            <input type="date" id="bookingDate" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="timeSlot">เวลา (Time)</label>
                            <select id="timeSlot" class="form-control" required>
                                <option value="" disabled selected>เลือกรอบเวลา</option>
                                <option value="10:00 - 11:30 น.">10:00 - 11:30 น.</option>
                                <option value="11:30 - 13:00 น.">11:30 - 13:00 น.</option>
                                <option value="13:00 - 14:30 น.">13:00 - 14:30 น.</option>
                                <option value="14:30 - 16:00 น.">14:30 - 16:00 น.</option>
                                <option value="16:00 - 17:30 น.">16:00 - 17:30 น.</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="guests">จำนวนแขก (Guests)</label>
                            <select id="guests" class="form-control" required>
                                <option value="1">1 Person</option>
                                <option value="2" selected>2 People</option>
                                <option value="3">3 People</option>
                                <option value="4">4 People</option>
                                <option value="5">5 People</option>
                                <option value="6+">6+ People</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="phone">เบอร์ติดต่อ (Phone)</label>
                            <input type="tel" id="phone" class="form-control" placeholder="08X-XXX-XXXX" pattern="[0-9]{9,10}" required>
                        </div>
                        <div class="form-group full">
                            <label for="customerName">ชื่อผู้จอง (Name)</label>
                            <input type="text" id="customerName" class="form-control" placeholder="ชื่อ-นามสกุล" required>
                        </div>
                        <div class="form-group full">
                            <label for="note">คำขอพิเศษ (Special Requests)</label>
                            <textarea id="note" class="form-control" placeholder="ระบุความต้องการเพิ่มเติม (ไม่บังคับ)"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Confirm Reservation</button>
                </form>

                <!-- Success Message -->
                <div id="successMessage" class="success-message" style="display: none;">
                    <div class="success-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <h3>Reservation Confirmed!</h3>
                    <p>ขอบคุณที่เลือก Brew & Brown นี่คือรหัสอ้างอิงของคุณ:</p>
                    <div class="ref-box">
                        <p>Booking ID</p>
                        <h4 id="refDisplay"></h4>
                    </div>
                    <button class="btn btn-outline" id="resetBtn">Make another booking</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Brew & Brown. Minimal Coffee Experience.</p>
    </footer>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="booking.js"></script>
</body>
</html>
